name: Semgrep
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 3 * * 1'
permissions:
  contents: read
  security-events: write
jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Scan
        run: semgrep scan --config auto --config .semgrep.yml --sarif --output semgrep.sarif --error .
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
