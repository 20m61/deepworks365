name: OWASP ZAP Baseline
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Preview or test environment URL
        required: true
        type: string
permissions:
  contents: read
jobs:
  zap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate target
        env:
          TARGET_URL: ${{ inputs.target_url }}
        run: |
          case "$TARGET_URL" in
            https://*) ;;
            *) echo "Only HTTPS targets are allowed"; exit 1 ;;
          esac
      - name: Run baseline scan
        env:
          TARGET_URL: ${{ inputs.target_url }}
        run: |
          docker run --rm             -v "$PWD:/zap/wrk/:rw"             ghcr.io/zaproxy/zaproxy:stable             zap-baseline.py -t "$TARGET_URL" -c .zap/rules.tsv             -r zap-report.html -J zap-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: |
            zap-report.html
            zap-report.json
