# GitHub Actions 非依存のローカルゲート。
# 導入:   scripts/setup-dev.sh  (pre-commit install + --hook-type pre-push)
# 全実行: make hooks            (pre-commit run --all-files)
minimum_pre_commit_version: "3.5.0"
default_install_hook_types: [pre-commit, pre-push]

repos:
  # --- commit 段階: 速い・自動修正できる衛生チェック ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-json
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json, --fix]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, "{extends: relaxed, rules: {line-length: disable}}"]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck

  # --- pre-push 段階: 型チェック・テスト・セキュリティ検査 ---
  - repo: local
    hooks:
      - id: typecheck
        name: pnpm typecheck
        entry: pnpm -r typecheck
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: unit-test
        name: pnpm test (vitest)
        entry: pnpm -r test
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: security-scan
        name: security scan (semgrep + osv-scanner)
        entry: scripts/run-security.sh
        language: script
        pass_filenames: false
        stages: [pre-push]
      - id: bicep-build
        name: bicep build
        entry: bash -c 'if command -v bicep >/dev/null 2>&1; then bicep build infra/main.bicep --stdout >/dev/null; elif command -v az >/dev/null 2>&1; then az bicep build --file infra/main.bicep --stdout >/dev/null; else echo "bicep/az 未導入のためスキップ"; fi'
        language: system
        pass_filenames: false
        files: '^infra/.*\.bicep$'
        stages: [pre-push]
